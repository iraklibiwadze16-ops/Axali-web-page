<head>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --success: #22c55e;
            --bg: #f1f5f9;
            --white: #ffffff;
            --yellow: #facc15;
            --wa: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Georgian', sans-serif; }
        body { background: var(--bg); color: var(--primary); padding-bottom: 60px; }

        /* ── HEADER ── */
        header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 20px;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto; }

        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-img { width: 40px; height: 40px; border-radius: 9px; object-fit: cover; border: 2px solid var(--accent); }
        .logo-text { font-size: 1.25rem; font-weight: 900; color: var(--primary); }
        .logo-text span { color: var(--accent); }

        .lang-nav { display: flex; gap: 6px; }
        .lang-btn {
            background: #f1f5f9; border: 1px solid #e2e8f0;
            padding: 6px 13px; font-size: 0.78rem; font-weight: 700;
            cursor: pointer; border-radius: 8px; transition: 0.2s; color: var(--primary);
            font-family: 'Noto Sans Georgian', sans-serif;
        }
        .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
        .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* ── CONTAINER ── */
        .container { max-width: 1000px; margin: 28px auto; padding: 0 16px; }

        /* ── BACK NAV ── */
        .back-nav {
            display: inline-flex; align-items: center; gap: 8px;
            text-decoration: none; color: var(--primary); font-weight: 700;
            margin-bottom: 20px; background: white;
            padding: 9px 16px; border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
            transition: 0.25s; font-size: 0.9rem;
        }
        .back-nav:hover { color: var(--accent); border-color: #bfdbfe; transform: translateX(-3px); }

        /* ── TABS ── */
        .tabs {
            display: flex; gap: 8px; margin-bottom: 20px; justify-content: center;
            background: white; padding: 6px; border-radius: 14px;
            border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            max-width: 400px; margin-left: auto; margin-right: auto; margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1; padding: 11px 20px; border: none; border-radius: 10px;
            font-weight: 800; cursor: pointer; background: transparent;
            color: #64748b; transition: 0.25s; font-size: 0.88rem;
            font-family: 'Noto Sans Georgian', sans-serif;
        }
        .tab-btn.active { background: var(--accent); color: white; box-shadow: 0 3px 10px rgba(37,99,235,0.3); }
        .tab-btn:hover:not(.active) { background: #f1f5f9; color: var(--primary); }

        /* ── CALC CARD ── */
        .calc-card {
            display: none; background: white; padding: 28px 26px;
            border-radius: 22px; box-shadow: 0 8px 32px rgba(0,0,0,0.07);
            border: 1px solid #e2e8f0;
        }
        .calc-card.active { display: block; animation: fadeIn 0.35s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }

        .calc-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 28px; }
        @media(max-width:820px) { .calc-grid { grid-template-columns: 1fr; } }

        /* ── FORM ELEMENTS ── */
        label {
            display: block; margin-bottom: 7px; font-weight: 700;
            font-size: 0.85rem; color: #475569; margin-top: 12px;
        }
        select, input {
            width: 100%; padding: 13px 14px;
            border: 2px solid #f1f5f9; border-radius: 12px;
            margin-bottom: 14px; font-size: 0.95rem; outline: none;
            background: #f8fafc; cursor: pointer; transition: 0.2s;
            font-family: 'Noto Sans Georgian', sans-serif; color: var(--primary);
        }
        select:focus, input:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
        select option { padding: 10px; font-weight: 600; }

        /* ── TYPE TOGGLE ── */
        .type-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
        .type-btn {
            flex: 1; padding: 10px 8px; border: 2px solid #e2e8f0;
            border-radius: 10px; cursor: pointer; font-weight: 700;
            background: white; transition: 0.2s; font-size: 0.82rem;
            font-family: 'Noto Sans Georgian', sans-serif; color: #64748b;
        }
        .type-btn.active { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
        .type-btn:hover:not(.active) { border-color: #94a3b8; }

        /* ── RESULT BOX ── */
        .res-box {
            background: var(--primary); color: white;
            padding: 28px 22px; border-radius: 18px;
            text-align: center;
            border: 2px solid var(--yellow);
            display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 8px 24px rgba(30,41,59,0.2);
        }
        .res-box p { font-size: 0.85rem; color: #94a3b8; margin-bottom: 10px; font-weight: 600; }
        .price-display {
            font-size: 4rem; font-weight: 900; color: var(--yellow);
            line-height: 1; display: block;
            text-shadow: 0 0 30px rgba(250,204,21,0.3);
        }
        .price-unit { font-size: 1.5rem; color: #94a3b8; margin-left: 4px; }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-action {
            padding: 14px 10px; border-radius: 11px; font-weight: 800;
            text-decoration: none; display: flex; align-items: center;
            justify-content: center; gap: 7px; font-size: 0.88rem;
            border: none; cursor: pointer; color: white; transition: 0.25s;
            font-family: 'Noto Sans Georgian', sans-serif;
        }
        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-wa { background: var(--wa); box-shadow: 0 4px 14px rgba(37,211,102,0.3); }
        .btn-call { background: var(--accent); box-shadow: 0 4px 14px rgba(37,99,235,0.3); }

        /* ── FOOTER ── */
        footer {
            background: var(--primary); color: #64748b;
            padding: 28px 20px; text-align: center; margin-top: 40px;
            border-top: 3px solid var(--accent);
        }
        footer p { font-size: 0.85rem; }
        footer span { color: #93c5fd; }
    </style>
</head>
<body>

                        </a>

            </div>
        </div>

            <div class="calc-grid">
                <div>
                    <label id="lbl-type-2">ავტომობილის ტიპი</label>
                    <div class="type-toggle">
                        <button class="type-btn active" id="country-light" onclick="setCountryType('light')">მსუბუქი / ჯიპი</button>
                        <button class="type-btn" id="country-heavy" onclick="setCountryType('heavy')">მარშუტკა/მინივენი</button>
                    </div>
                    <label id="lbl-dest">მიმართულება თბილისიდან</label>
                    <select id="interCity" onchange="calculateCountry()"></select>
                    <div id="kmInputBlock" style="display:none;">
                        <label id="lbl-km">შეიყვანეთ მანძილი (კმ)</label>
                        <input type="number" id="kmValue" placeholder="მაგ: 150" oninput="calculateCountry()">
                    </div>
                </div>
                <div class="res-box">
                    <p id="countryTypeLabel">1.5 ₾/კმ</p>
                    <div>
                        <span class="price-display" id="countryPrice">170</span>
                        <span class="price-unit">₾</span>

                    <div class="action-btns">
                        <button class="btn-action btn-wa" onclick="sendWA('country')">
                            <i class="fab fa-whatsapp"></i> <span class="wa-text">მოგვწერეთ</span>
                        </button>
                        <a href="tel:+40726517906" class="btn-action btn-call">
                            <i class="fas fa-phone"></i> <span class="call-text">დარეკვა</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 <span>I&T Group</span> — 24/7 Roadside Assistance</p>
    </footer>

    <script>
        let currentLang = 'ka';
        let cityType = 'light';
        let countryType = 'light';

        const translations = {

        function setLang(l, event) {
            currentLang = l;
            const t = translations[l];
            document.getElementById('tab-city').innerText = t.tabCity;
            document.getElementById('tab-country').innerText = t.tabCountry;
            document.getElementById('lbl-type-1').innerText = t.lblType;
            document.getElementById('lbl-type-2').innerText = t.lblType;
            document.getElementById('lbl-from').innerText = t.lblFrom;
            document.getElementById('lbl-to').innerText = t.lblTo;
            document.getElementById('lbl-dest').innerText = t.lblDest;
            document.getElementById('lbl-km').innerText = t.lblKm;
            document.getElementById('btn-back').innerText = t.back;

            const startS = document.getElementById('startPoint');
            startS.innerHTML = '';
            t.districts.forEach(d => startS.add(new Option(d, d)));

            const interSelect = document.getElementById('interCity');
            interSelect.innerHTML = '';
            t.cities.forEach(c => {
                let opt = new Option(c.n, c.v);
                opt.setAttribute('data-heavy', c.h);
                interSelect.add(opt);
            });
            interSelect.add(new Option(t.other, 'custom'));

            document.querySelectorAll('.wa-text').forEach(el => el.innerText = t.wa);
            document.querySelectorAll('.call-text').forEach(el => el.innerText = t.call);
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');

            updateToDropdownPrices();
            calculateCountry();
        }

        function calculateLogicalPrice(a, b) {
            if (a === b) return 60;
            const inGrp = (dist, grp) => grp.includes(dist);
            const has = (grpA, grpB) => (inGrp(a,grpA)&&inGrp(b,grpB))||(inGrp(b,grpA)&&inGrp(a,grpB));

            const zahesi = ["ზაჰესი","ავჭალა","Zahesi","Avchala","Захеси","Авчала"];
            const gldani = ["გლდანი","გლდანის ციხეები","Gldani","Gldani Prisons","Глдани","Тюрьмы Глдани"];
            const mukhiani = ["მუხიანი","თემქა","Mukhiani","Temka","Мухиани","Темка"];
            const sea = ["ზღვის უბანი","ივერთუბანი","მახათას მთა","Sea District","Ivertubani","Makhata Mountain","Тбилисское море","Ивертубани","Махата"];
            const saburtalo_vake = ["საბურთალო","ვაკე","ნუცუბიძე","ბაგები","Saburtalo","Vake","Nutsubidze","Bagebi","Сабуртало","Ваке","Нуцубидзе","Багеби"];
            const didube_eliava = ["დიდუბე","ელიავა","Didube","Eliava","Дидубе","Элиава"];
            const center = ["მარჯანიშვილი","რუსთაველი","მთაწმინდა","ვერა","ვაგზალი","პლეხანოვი","ჩუღურეთი","ნაძალადევი","ნახალოვკა","ლოტკინი","Marjanishvili","Rustaveli","Mtatsminda","Vera","Station Square","Plekhanov","Chughureti","Nadzaladevi","Nakhalovka","Lotkini","Марджанишвили","Руставели","Мтацминда","Вера","Вокзал","Плеханова","Чугурети","Надзаладеви","Нахаловка","Лоткини","Vagzali"];
            const ortachala_isani = ["ორთაჭალა","ისანი","ავლაბარი","კრწანისი","Ortachala","Isani","Avlabari","Krtsanisi","Ортачала","Исани","Авлабари","Крцаниси"];
            const varketili_samgori = ["ვარკეთილი","ვაზისუბანი","სამგორი","აფრიკა","Varketili","Vazisubani","Samgori","Africa","Варкетили","Вазисубани","Самгори","Африка"];
            const ponichala = ["ფონიჭალა","Ponichala","Поничала"];
            const lilo = ["ლილო","Lilo","Лило"];
            const dighomi = ["დიდი დიღომი","დიღმის მასივი","ვაშლიჯვარი","Didi Dighomi","Dighomi Masivi","Vashlijvari","Диди Дигоми","Дигомский массив","Вашлиджвари"];

            if (inGrp(a,ponichala)||inGrp(b,ponichala)) {
                if (inGrp(a,ortachala_isani)||inGrp(b,ortachala_isani)) return 70;
                if (inGrp(a,varketili_samgori)||inGrp(b,varketili_samgori)) return 70;
                return 80;
            }
            if (inGrp(a,lilo)||inGrp(b,lilo)) {
                if (inGrp(a,varketili_samgori)||inGrp(b,varketili_samgori)) return 60;
                if (inGrp(a,zahesi)||inGrp(b,zahesi)||inGrp(a,saburtalo_vake)||inGrp(b,saburtalo_vake)||inGrp(a,dighomi)||inGrp(b,dighomi)) return 80;
                return 70;
            }
            if (has(zahesi,saburtalo_vake)) return 70;
            if (has(zahesi,ortachala_isani)) return 70;
            if (has(zahesi,varketili_samgori)) return 70;
            if (has(saburtalo_vake,ortachala_isani)) return 70;
            if (has(saburtalo_vake,varketili_samgori)) return 70;
            if (has(gldani,varketili_samgori)) return 70;
            if (has(dighomi,ortachala_isani)) return 70;
            if (has(dighomi,varketili_samgori)) return 70;
            if (has(mukhiani,varketili_samgori)) return 60;
            if (has(sea,varketili_samgori)) return 60;
            if (has(zahesi,didube_eliava)) return 60;
            if (has(zahesi,gldani)||has(zahesi,mukhiani)) return 60;
            if (has(center,ortachala_isani)) return 60;
            if (has(center,saburtalo_vake)) return 60;
            if (has(center,varketili_samgori)) return 60;
            return 60;
        }

        function updateToDropdownPrices() {
            const startVal = document.getElementById('startPoint').value;
            const endS = document.getElementById('endPoint');
            const savedEndValue = endS.value;
            const t = translations[currentLang];
            endS.innerHTML = '';
            t.districts.forEach(d => {
                let price = calculateLogicalPrice(startVal, d);
                if (cityType === 'heavy') price += 30;
                endS.add(new Option(`${d} — ${price}₾`, d));
            });
            if (savedEndValue) endS.value = savedEndValue;
            updateFinalPrice();
        }

        function updateFinalPrice() {
            const start = document.getElementById('startPoint').value;
            const end = document.getElementById('endPoint').value;
            let finalPrice = calculateLogicalPrice(start, end);
            if (cityType === 'heavy') finalPrice += 30;
            document.getElementById('cityPrice').innerText = finalPrice;
        }

        function setCityType(type) {
            cityType = type;
            document.getElementById('city-light').classList.toggle('active', type==='light');
            document.getElementById('city-heavy').classList.toggle('active', type==='heavy');
            document.getElementById('cityTypeLabel').innerText = type==='light' ? translations[currentLang].btnLight : translations[currentLang].btnHeavy+' (+30₾)';
            updateToDropdownPrices();
        }

        function showTab(type) {
            document.querySelectorAll('.calc-card,.tab-btn').forEach(el => el.classList.remove('active'));
            if (type==='city') {
                document.getElementById('cityCalc').classList.add('active');
                document.getElementById('tab-city').classList.add('active');
            } else {
                document.getElementById('countryCalc').classList.add('active');
                document.getElementById('tab-country').classList.add('active');
            }
        }

        function setCountryType(type) {
            countryType = type;
            document.getElementById('country-light').classList.toggle('active', type==='light');
            document.getElementById('country-heavy').classList.toggle('active', type==='heavy');
            document.getElementById('countryTypeLabel').innerText = type==='light' ? '1.5 ₾/კმ' : '2.0 ₾/კმ';
            calculateCountry();
        }

        function calculateCountry() {
            const sel = document.getElementById('interCity');
            const kmBlock = document.getElementById('kmInputBlock');
            let price = 0;
            if (sel.value==='custom') {
                kmBlock.style.display = 'block';
                const km = document.getElementById('kmValue').value || 0;
                price = 50 + (km * (countryType==='light' ? 1.5 : 2.0));
            } else {
                kmBlock.style.display = 'none';
                price = countryType==='light' ? sel.value : sel.options[sel.selectedIndex].getAttribute('data-heavy');
            }
            document.getElementById('countryPrice').innerText = Math.round(price);
        }

        function sendWA(mode) {
            let msg = "";
            const t = translations[currentLang];
            if (mode==='city') {
                const start = document.getElementById('startPoint').value;
                const end = document.getElementById('endPoint').value;
                const price = document.getElementById('cityPrice').innerText;
                const type = cityType==='light' ? t.btnLight : t.btnHeavy;
                msg = `გამარჯობა, მჭირდება ევაკუატორი (${type})%0Aსაიდან: ${start}%0Aსად: ${end}%0Aფასი: ${price} ლარი`;
            } else {
                const dest = document.getElementById('interCity').options[document.getElementById('interCity').selectedIndex].text;
                const price = document.getElementById('countryPrice').innerText;
                const type = countryType==='light' ? t.btnLight : t.btnHeavy;
                msg = `გამარჯობა, მჭირდება ევაკუატორი (${type})%0Aმიმართულება: ${dest}%0Aფასი: ${price} ლარი`;
            }
            window.open(`https://wa.me/40726517906?text=${msg}`, '_blank');
        }

        setLang('ka');
    </script>
</body>
</html>
